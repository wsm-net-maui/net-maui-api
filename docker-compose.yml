services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: controle_estoque_api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DBHOST: mysql
      DBPORT: "3306"
      DBPASSWORD: numSey
    ports:
      - "8080:8080"
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: controle_estoque_mysql
    environment:
      MYSQL_ROOT_PASSWORD: numSey
      MYSQL_DATABASE: controle_estoque
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pnumSey"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  mysql_data:
